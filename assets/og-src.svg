<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="lg" x1="0" y1="630" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset=".55" stop-color="#e457c2"/>
      <stop offset="1" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="lg2" x1="260" y1="315" x2="420" y2="315" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c4a7ff"/>
      <stop offset="1" stop-color="#ff8de0"/>
    </linearGradient>
    <radialGradient id="glow1" cx=".18" cy=".05" r=".7">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity=".2"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx=".9" cy=".95" r=".8">
      <stop offset="0" stop-color="#e457c2" stop-opacity=".16"/>
      <stop offset="1" stop-color="#e457c2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glass" cx=".38" cy=".32" r=".9">
      <stop offset="0" stop-color="#241a3d"/>
      <stop offset="1" stop-color="#0b0816"/>
    </radialGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0v44" fill="none" stroke="#aa96dc" stroke-opacity=".08"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#08060f"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- logo mark: hexagon + lens + pulse -->
  <g transform="translate(150 155) scale(3.4)">
    <path d="M32 3.5 56.5 17.6v28.3L32 60.5 7.5 45.9V17.6Z"
          fill="url(#glass)" stroke="url(#lg)" stroke-width="3.2" stroke-linejoin="round"/>
    <circle cx="32" cy="32" r="15.5" fill="none" stroke="url(#lg)" stroke-width="2.6"/>
    <path d="M14 32h8.5l3-6.5 5 13.5 5.5-19 4.5 12h9.5"
          fill="none" stroke="url(#lg2)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="50" cy="32" r="2.6" fill="#ff8de0"/>
  </g>

  <!-- wordmark -->
  <text x="420" y="278" font-family="'Space Grotesk','Inter',system-ui,sans-serif" font-size="96" font-weight="700" letter-spacing="-3">
    <tspan fill="#f0ecfa">sre</tspan><tspan fill="url(#lg)">lens</tspan>
  </text>

  <!-- tagline -->
  <text x="422" y="342" font-family="'Space Grotesk','Inter',system-ui,sans-serif" font-size="34" font-weight="500" fill="#a094b8">See everything. Break nothing.</text>

  <!-- status pill -->
  <rect x="422" y="382" width="560" height="46" rx="23" fill="#8b5cf6" fill-opacity=".1" stroke="#a78bfa" stroke-opacity=".45"/>
  <circle cx="452" cy="405" r="5" fill="#f472d0"/>
  <text x="470" y="412" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="19" letter-spacing="2" fill="#c4a7ff">ALL CLUSTERS OPERATIONAL</text>

  <!-- footer strip -->
  <text x="150" y="560" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="20" letter-spacing="4" fill="#675e80">RUST · TAURI V2 · KUBE-RS · MCP</text>
  <text x="1050" y="560" text-anchor="end" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="20" fill="#675e80">srelens.com</text>
</svg>
