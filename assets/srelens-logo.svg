<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">srelens logo</title>
  <desc id="desc">A Kubernetes and SRE observability logo with a cluster hexagon and a magnifying lens.</desc>
  <defs>
    <linearGradient id="brand" x1="84" y1="53" x2="370" y2="383" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1769FF"/>
      <stop offset="0.58" stop-color="#087AE8"/>
      <stop offset="1" stop-color="#0AB5A1"/>
    </linearGradient>
    <linearGradient id="ring" x1="132" y1="120" x2="290" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1769FF"/>
      <stop offset="0.7" stop-color="#0B83E5"/>
      <stop offset="1" stop-color="#08A99B"/>
    </linearGradient>
    <linearGradient id="word" x1="745" y1="170" x2="1235" y2="355" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1769FF"/>
      <stop offset="1" stop-color="#1C69F6"/>
    </linearGradient>
  </defs>

  <!-- Brand mark -->
  <g transform="translate(66 54)">
    <!-- Cluster hexagon -->
    <path d="M184 16 L330 100 L330 268 L184 352 L38 268 L38 100 Z" stroke="url(#brand)" stroke-width="17" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Cluster nodes -->
    <circle cx="184" cy="16" r="20" fill="#1769FF" stroke="#fff" stroke-width="5"/>
    <circle cx="38" cy="268" r="20" fill="#1769FF" stroke="#fff" stroke-width="5"/>
    <circle cx="330" cy="268" r="20" fill="#35D28C" stroke="#fff" stroke-width="5"/>

    <!-- Lens outer orbit -->
    <path d="M113 213 A77 77 0 0 1 142 125" stroke="url(#ring)" stroke-width="20" stroke-linecap="round"/>
    <path d="M160 107 A77 77 0 0 1 221 109" stroke="url(#ring)" stroke-width="20" stroke-linecap="round"/>
    <path d="M244 127 A77 77 0 0 1 260 207" stroke="url(#ring)" stroke-width="20" stroke-linecap="round"/>
    <path d="M237 235 A77 77 0 0 1 177 261" stroke="url(#ring)" stroke-width="20" stroke-linecap="round"/>
    <path d="M148 252 A77 77 0 0 1 113 226" stroke="url(#ring)" stroke-width="20" stroke-linecap="round"/>

    <!-- Lens core -->
    <circle cx="187" cy="184" r="42" fill="#22324D"/>
    <circle cx="187" cy="184" r="22" fill="#fff" opacity="0.10"/>

    <!-- Search handle -->
    <path d="M216 214 L287 285" stroke="#26364F" stroke-width="33" stroke-linecap="round"/>
    <path d="M217 215 L285 283" stroke="#344862" stroke-width="12" stroke-linecap="round" opacity="0.7"/>

    <!-- Small SRE signal point -->
    <path d="M184 72 V100" stroke="#1769FF" stroke-width="16" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(455 0)">
    <text x="0" y="320" fill="#24324A" font-family="Inter, Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="210" font-weight="500" letter-spacing="-12">sre</text>
    <text x="360" y="320" fill="url(#word)" font-family="Inter, Avenir Next, Helvetica Neue, Arial, sans-serif" font-size="210" font-weight="500" letter-spacing="-12">lens</text>
  </g>
</svg>
